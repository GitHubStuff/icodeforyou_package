name: datetime_package
description: "Widgets and Utils for DateTime"
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0 <4.0.0"

dependencies:
  auto_size_text: ^3.0.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  icodeforyou_package:
    path: ../..
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0

# Element of flutter_gen https://pub.dev/packages/flutter_gen/install
# '% dart pub global activate flutter_gen'
# '% fluttergen'
flutter_gen:
  line_length: 132

flutter:
  uses-material-design: true
  assets:
    - assets/images/
