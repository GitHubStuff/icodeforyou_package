name: theme_package
description: "Widget package for apps to persist theme settings across launches."
version: 0.0.1+1
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  gap:  ^3.0.1
  icodeforyou_package:
    path: ../..

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

# Element of flutter_gen https://pub.dev/packages/flutter_gen/install
# '% dart pub global activate flutter_gen'
# '% fluttergen'
flutter_gen:
  line_length: 132

flutter:
  uses-material-design: true
  assets:
    - assets/images/
