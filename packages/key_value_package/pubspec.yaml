name: key_value_package
description: "A NoSql like key-value storage package for Flutter"
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

# Element of flutter_gen https://pub.dev/packages/flutter_gen/install
# '% dart pub global activate flutter_gen'
# '% fluttergen'
flutter_gen:
  line_length: 132

flutter:
  uses-material-design: true
  assets:
    - assets/images/
